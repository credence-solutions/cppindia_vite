services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    hostname: app
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ..:/workspace
      - node_modules:/workspace/frontend/node_modules
    ports:
      - '${DEV_SERVER_PORT:-5173}:5173'
    command: sleep infinity

volumes:
  node_modules:
